<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageForge — SKU 视觉生产工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=20260430-upload-feedback">
</head>
<body>

<!-- ===== Top Nav ===== -->
<nav class="topnav">
    <div class="topnav-brand"><span class="icon">🎨</span> ImageForge</div>
    <div class="topnav-links" id="topNav">
        <button class="active" onclick="showPage('workbench')">SKU工作台</button>
        <button onclick="showPage('tasks')">生图任务</button>
        <button onclick="showPage('assets')">图片资产库</button>
        <button onclick="showPage('knowledge')">文档知识库</button>
        <button onclick="showPage('settings')">模型配置</button>
    </div>
</nav>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== Shell ===== -->
<div class="shell">

<!-- ============================================================ -->
<!-- PAGE: SKU 工作台                                              -->
<!-- ============================================================ -->
<div id="page-workbench" class="page active">

    <!-- Left: SKU List -->
    <aside class="wb-left">
        <div class="sku-search">
            <input type="text" id="skuSearchInput" placeholder="搜索 SKU..." oninput="filterSkuList()">
            <button class="btn btn-primary btn-sm" onclick="openNewProductModal()" title="新建 SKU" style="padding:4px 10px;font-size:16px;line-height:1;">＋</button>
        </div>
        <div class="sku-list" id="skuList"></div>
    </aside>

    <!-- Center -->
    <section class="wb-center">

        <!-- Header -->
        <div class="wb-header" id="wbHeader">
            <div class="wb-header-info">
                <h2 id="wbSkuTitle">选择一个 SKU 开始</h2>
                <div class="meta" id="wbSkuMeta"></div>
            </div>
            <div class="wb-header-actions">
                <button class="btn btn-secondary btn-sm" onclick="openSkuAssetModal()">📎 SKU素材</button>
                <button class="btn btn-primary btn-sm" id="btnExplore" onclick="launchExplore()">🔍 发起 Explore</button>
                <button class="btn btn-secondary btn-sm" id="btnBatch" onclick="toast('请先完成 Explore','info')">📦 进入 Batch</button>
            </div>
        </div>

        <!-- Body: Image Plan + Candidates -->
        <div class="wb-body" id="wbBody">
            <div id="imagePlanArea"></div>
            <div id="exploreCandidateArea"></div>
        </div>

        <!-- Bottom Chat -->
        <div class="wb-chat">
            <textarea class="wb-chat-input" id="chatInput" rows="1" placeholder="告诉 Agent 你想怎么调整当前 SKU / 当前图片，例如：首图1更显大，场景靠墙，加入缅因猫，使用猫爬架Amazon模板。"></textarea>
            <button class="btn btn-primary btn-sm" onclick="toast('Agent 对话即将上线','info')">发送</button>
        </div>
    </section>

    <!-- Right: Knowledge Context -->
    <aside class="wb-right" id="wbRight">
        <div class="wb-right-header">
            <h3>📚 知识上下文</h3>
            <button class="btn-ghost btn-xs" onclick="toggleRightPanel()">收起 ›</button>
        </div>
        <div class="wb-right-body" id="wbRightBody"></div>
    </aside>
</div>

<!-- ============================================================ -->
<!-- PAGE: 生图任务                                                -->
<!-- ============================================================ -->
<div id="page-tasks" class="page tasks-page">
    <div class="tasks-header">
        <h2>生图任务</h2>
        <button class="btn btn-primary" onclick="openNewTaskModal()">＋ 新建任务</button>
    </div>
    <div class="tasks-body" id="taskListArea"></div>
</div>

<!-- ============================================================ -->
<!-- PAGE: 图片资产库                                              -->
<!-- ============================================================ -->
<div id="page-assets" class="page assets-page">
    <div class="assets-header">
        <h2>图片资产库</h2>
    </div>
    <div class="assets-body" id="assetLibraryArea"></div>
</div>

<!-- ============================================================ -->
<!-- PAGE: 文档知识库                                              -->
<!-- ============================================================ -->
<div id="page-knowledge" class="page kb-page">
    <div class="kb-header">
        <h2>文档知识库</h2>
        <div class="kb-tabs" id="kbTabs">
            <button class="active" onclick="showKbTab('category')">品类知识库</button>
            <button onclick="showKbTab('inspiration')">素材灵感库</button>
            <button onclick="showKbTab('standard')">标准素材库</button>
        </div>
    </div>
    <div class="kb-body" id="kbBody"></div>
</div>

<!-- ============================================================ -->
<!-- PAGE: 模型配置                                                -->
<!-- ============================================================ -->
<div id="page-settings" class="page settings-page">
    <div class="settings-body" id="settingsBody"></div>
</div>

</div><!-- /shell -->

<!-- ===== Modals ===== -->
<!-- New Product Modal -->
<div class="modal-overlay" id="productModal">
    <div class="modal">
        <div class="modal-header"><h2>新建 SKU</h2><button class="modal-close" onclick="closeModal('productModal')">✕</button></div>
        <div class="modal-body">
            <form id="productForm" onsubmit="handleProductSubmit(event)">
                <div class="form-grid">
                    <div class="form-group"><label class="form-label">产品编号 *</label><input class="form-input" name="product_id" placeholder="如 PCT020" required></div>
                    <div class="form-group"><label class="form-label">产品名称 *</label><input class="form-input" name="name" placeholder="如 205cm XXL Cat Tree" required></div>
                    <div class="form-group full"><label class="form-label">产品描述</label><textarea class="form-textarea" name="description" rows="2" placeholder="产品详细描述..."></textarea></div>
                    <div class="form-group"><label class="form-label">目标人群</label><input class="form-input" name="target_audience" placeholder="大猫家庭、多猫家庭"></div>
                    <div class="form-group"><label class="form-label">产品定位</label><input class="form-input" name="positioning" placeholder="高端、大型"></div>
                    <div class="form-group full"><label class="form-label">卖点 (每行一个)</label><textarea class="form-textarea" name="selling_points" rows="3"></textarea></div>
                    <div class="form-group full"><label class="form-label">产品图片</label>
                        <div class="upload-zone" id="productUploadZone">
                            <div class="icon">📷</div><div class="text">拖拽图片到此处，或 <strong>点击上传</strong></div>
                            <input type="file" name="product_image" accept="image/*" onchange="handleImagePreview(event,'productUploadZone')">
                        </div>
                    </div>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('productModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- New Task Modal -->
<div class="modal-overlay" id="taskModal">
    <div class="modal">
        <div class="modal-header"><h2>新建生图任务</h2><button class="modal-close" onclick="closeModal('taskModal')">✕</button></div>
        <div class="modal-body">
            <form id="taskForm" onsubmit="handleTaskSubmit(event)">
                <div class="form-grid">
                    <div class="form-group"><label class="form-label">选择产品 *</label>
                        <select class="form-select" name="product_id" id="taskProductSelect" required><option value="">-- 选择 --</option></select>
                    </div>
                    <div class="form-group"><label class="form-label">模式</label>
                        <select class="form-select" name="mode"><option value="explore" selected>Explore 候选</option><option value="batch">Batch 批量</option></select>
                    </div>
                    <div class="form-group"><label class="form-label">图像模型</label>
                        <select class="form-select" name="model"><option value="gpt-image-2">gpt-image-2</option></select>
                    </div>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('taskModal')">取消</button>
                    <button type="submit" class="btn btn-primary">🚀 开始</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Upload Pack Modal -->
<div class="modal-overlay" id="uploadPackModal">
    <div class="modal">
        <div class="modal-header"><h2>上传素材包</h2><button class="modal-close" onclick="closeModal('uploadPackModal')">✕</button></div>
        <div class="modal-body">
            <form onsubmit="handlePackUpload(event)">
                <div class="form-grid">
                    <div class="form-group full"><label class="form-label">文件 *（支持 PDF / PNG / JPG / SVG / WebP）</label>
                        <div class="upload-zone"><div class="icon">📎</div><div class="text">拖拽文件到此处，或 <strong>点击上传</strong></div><input type="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.svg,.webp,.gif,.bmp,.tiff" multiple required onchange="handleFileSelect(event)"></div>
                    </div>
                    <div class="form-group"><label class="form-label">素材包名称</label><input class="form-input" name="name" placeholder="如 Feandrea listing图标集"></div>
                    <div class="form-group"><label class="form-label">适用品类</label><input class="form-input" name="category" value="Pet Supplies,Cat Furniture"></div>
                    <div class="form-group full"><label class="form-label">用途</label><input class="form-input" name="usage" value="listing_info_graph,feature_icon"></div>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('uploadPackModal')">取消</button>
                    <button type="submit" class="btn btn-primary">📤 上传并解析</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Upload Doc Modal -->
<div class="modal-overlay" id="uploadDocModal">
    <div class="modal">
        <div class="modal-header"><h2>上传知识库文档</h2><button class="modal-close" onclick="closeModal('uploadDocModal')">✕</button></div>
        <div class="modal-body">
            <form onsubmit="handleDocUpload(event)">
                <div class="form-grid">
                    <div class="form-group full"><label class="form-label">文档文件 *</label>
                        <div class="upload-zone"><div class="icon">📋</div><div class="text">支持 PDF / DOCX / TXT / MD，拖拽或 <strong>点击上传</strong></div><input type="file" name="file" accept=".pdf,.docx,.doc,.txt,.md" required onchange="handleFileSelect(event)"></div>
                    </div>
                    <div class="form-group"><label class="form-label">文档名称</label><input class="form-input" name="name" placeholder="如 猫爬架Amazon模板"></div>
                    <div class="form-group"><label class="form-label">英文名称</label><input class="form-input" name="name_en" placeholder="Cat Tree Template"></div>
                    <div class="form-group full"><label class="form-label">适用品类</label><input class="form-input" name="category" value="Pet Supplies,Cat Furniture"></div>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('uploadDocModal')">取消</button>
                    <button type="submit" class="btn btn-primary">📤 上传并解析</button>
                </div>
            </form>
        </div>
    </div>
	</div>

<!-- SKU Asset Modal -->
<div class="modal-overlay" id="skuAssetModal">
    <div class="modal modal-wide">
        <div class="modal-header"><h2 id="skuAssetTitle">SKU 素材管理</h2><button class="modal-close" onclick="closeModal('skuAssetModal')">✕</button></div>
        <div class="modal-body">
            <form onsubmit="handleSkuAssetUpload(event)" style="margin-bottom:16px;">
                <input type="hidden" id="skuAssetProductId">
                <div class="form-grid">
                    <div class="form-group full"><label class="form-label">上传/替换 SKU 原始商品图</label>
                        <div class="upload-zone"><div class="icon">📷</div><div class="text">上传当前 SKU 的主体参考图</div><input type="file" name="file" accept="image/*" required onchange="handleFileSelect(event)"></div>
                    </div>
                </div>
                <div style="display:flex;justify-content:flex-end;margin-top:12px;">
                    <button type="submit" class="btn btn-primary">上传 SKU 素材</button>
                </div>
            </form>
            <div id="skuAssetList"></div>
        </div>
    </div>
</div>

<!-- Candidate Lightbox Modal -->
<div class="modal-overlay" id="candidateLightboxModal">
    <div class="modal modal-lightbox">
        <div class="modal-header"><h2 id="candidateLightboxTitle">候选图</h2><button class="modal-close" onclick="closeModal('candidateLightboxModal')">✕</button></div>
        <div class="modal-body" id="candidateLightboxBody"></div>
    </div>
</div>

	<script src="/static/app.js?v=20260430-upload-feedback"></script>
</body>
</html>
